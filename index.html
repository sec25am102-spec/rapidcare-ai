<!DOCTYPE html>
<html>
<head>
  <title>RapidCare AI Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚑 RapidCare AI Command Dashboard</h1>

<div class="card">
  <h2>🛏 ICU Beds Available</h2>
  <p id="beds">12 Beds Free</p>
</div>

<div class="card">
  <h2>🚑 Ambulance Status</h2>
  <p id="ambulance">3 Ambulances Available</p>
</div>

<div class="card">
  <h2>🚨 Emergency Actions</h2>
  <button onclick="triggerEmergency()">Trigger Emergency Alert</button>
  <button onclick="voiceAlert()">Voice Alert 🎙</button>
</div>

<div class="card">
  <h2>📋 Active Emergencies</h2>
  <ul id="emergencyList"></ul>
</div>

<script>

function triggerEmergency(){
  const list = document.getElementById("emergencyList");
  const item = document.createElement("li");
  item.innerText = "Code Blue – Ward 3 (Doctor Notified)";
  list.appendChild(item);
  alert("Emergency Alert Sent to Medical Team!");
}

function voiceAlert(){
  alert("Voice detected: Code Blue in ICU. Alert Sent!");
}

</script>
  <script>
async function getEmergencyAdvice() {

  const apiKey = "AIzaSyBvy-euIKJaUIuI85P33oi-FAGXzNIjoY4";

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + apiKey,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: "Emergency SOS button pressed. Give short first aid and safety steps in 3 lines."
          }]
        }]
      })
    }
  );

  const data = await response.json();
  const text = data.candidates[0].content.parts[0].text;

  document.getElementById("aiAdvice").innerText = text;
}
  </script>

</body>
</html>
